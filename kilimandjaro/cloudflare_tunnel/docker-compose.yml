services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command:
      - tunnel
      - --no-autoupdate
      - run
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - caddy_public
      - cloudflare_tunnel
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}

networks:
  caddy_public:
    external: true
  cloudflare_tunnel:
    name: cloudflare_tunnel
    driver: bridge